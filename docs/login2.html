<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/CSS/login.css">
</head>
<body>
   <div class="log">
    <h1>Login</h1>

    <form action="">
        <div class="email">
       <h3>EMAIL:</h3>
       <input type="text" placeholder="Email Address" id="mail" name="Mail">
        </div>

        <div class="password">
          <h3>PASSWORD:</h3>
          <input type="password" placeholder="Password" id="pword" name="Pword">
           <i class="fa-solid fa-eye" id="togglePassword"
     style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #201f1f;"></i>
        </div>
       
<div class="basic">
<!-- Toggle Switch -->
 <div class="blow">
 <label class="switch">
    <input type="checkbox" name="remember">
    <span class="slider"></span>
     </label>
      <span>Remember me</span>
      </div>

<div class="forgot">
<a href="">Forgot Password?</a>
</div>
</div>
<div class="box">
<button onclick="Enter()">Login</button>
</div>
<p id="logininfo"></p>

<div class="line">
 <p> Or login with </p>
</div>

<div class="rem">
<div class="fb">
<i class="ri-google-fill"></i>
</div>
<div class="fb">
<i class="ri-apple-fill"></i>
</div>
<div class="fb">
<i class="ri-facebook-circle-fill"></i>
</div>
</div>

<div class="sign">
<p>Don't have an account? <span>Signup</span> </p>
</div> 
</body>
<script src="/JS/login.js"></script>
</html>
